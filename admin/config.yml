backend:
  name: github
  repo: Dinesh-raya/dinesh-raya.github.io # ◄ Verify this matches your exact username casing!
  branch: main
  base_url: https://github-oauth-gate.dineshraya365.workers.dev # We will link your free login key here

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Blog Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Brief Summary", name: "description", widget: "text" }
      - { label: "Post Body Content", name: "body", widget: "markdown" }