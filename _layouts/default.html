<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/svg+xml" href="/raya.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F3F3F3;
      --surface: #ffffff;
      --surface-alt: #fdfdfd;
      --text: #111111;
      --text-secondary: #333333;
      --text-muted: #666666;
      --text-light: #888888;
      --border: #dddddd;
      --border-light: #eeeeee;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.06);
      --card-shadow-hover: 0 8px 32px rgba(0,0,0,0.12);
      --inline-code-bg: #f0f0f0;
      --blockquote-bg: #f8f8f8;
      --blockquote-color: #555555;
      --table-header-bg: #f8f8f8;
      --table-border: #e0e0e0;
      --h3-card-color: #111827;
      --icon-bg: #ffffff;
      --copyright-color: #666666;
      --footer-link: #cccccc;
      --back-link: #666666;
      --back-link-hover: #111111;
      --link-color: #000000;
      --hr-color: #eeeeee;
      --accent: #276EF1;
      --accent-hover: #1e5bc0;
      --border-radius: 20px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface-alt: #222222;
        --text: #e5e5e5;
        --text-secondary: #b0b0b0;
        --text-muted: #888888;
        --text-light: #666666;
        --border: #333333;
        --border-light: #2a2a2a;
        --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
        --card-shadow-hover: 0 8px 32px rgba(0,0,0,0.6);
        --inline-code-bg: #2a2a2a;
        --blockquote-bg: #1a1a1a;
        --blockquote-color: #999999;
        --table-header-bg: #222222;
        --table-border: #333333;
        --h3-card-color: #e5e5e5;
        --icon-bg: #1a1a1a;
        --copyright-color: #888888;
        --footer-link: #666666;
        --back-link: #999999;
        --back-link-hover: #ffffff;
        --link-color: #e5e5e5;
        --hr-color: #333333;
      }
    }
    html { scroll-padding-top: 80px; }
    * {
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    header {
      background: #000;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header .logo a {
      display: block;
    }
    header .logo img {
      height: 40px;
      display: block;
    }
    header nav {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    header nav a {
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 400;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    header nav a:hover {
      opacity: 1;
    }
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      -webkit-appearance: none;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px 20px;
      flex: 1;
      width: 100%;
      box-sizing: border-box;
    }
    footer {
      background: #000;
      color: #fff;
      padding: 20px 40px;
      margin-top: auto;
    }
    footer .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    footer .footer-links a {
      color: var(--footer-link);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    footer .footer-links a:hover {
      color: #fff;
    }
    footer .copyright {
      text-align: center;
      margin-top: 10px;
      color: var(--copyright-color);
      font-size: 0.8rem;
    }

    .page { max-width: 720px; margin: 0 auto; }
    .page h1 { font-size: 2em; margin-bottom: 8px; }
    .page h2 { font-size: 1.3em; margin: 28px 0 12px; }
    .page p { font-size: 17px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 16px; }
    .page ul { margin: 0 0 20px; padding-left: 24px; }
    .page li { font-size: 17px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 8px; }

    .mobile-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 998;
    }
    .mobile-overlay.active {
      display: block;
    }
    .mobile-nav {
      display: none;
      position: fixed;
      top: 70px;
      left: 0;
      width: 85%;
      max-width: 320px;
      height: calc(100vh - 70px);
      background: #000;
      z-index: 999;
      flex-direction: column;
      padding: 20px;
      box-sizing: border-box;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      box-shadow: 4px 0 16px rgba(0,0,0,0.3);
    }
    .mobile-nav.open {
      transform: translateX(0);
    }
    .mobile-nav a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      padding: 14px 12px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .mobile-nav a:hover {
      background: rgba(255,255,255,0.05);
    }

    @media (max-width: 850px) {
      header {
        padding: 16px 20px;
      }
      header nav {
        display: none;
      }
      .menu-toggle {
        display: block;
      }
      .mobile-nav {
        display: flex;
      }
      .container {
        padding: 16px;
      }
      footer {
        padding: 20px 10px;
      }
      footer .footer-links a {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <div class="mobile-overlay" id="mobileOverlay"></div>
  <div class="mobile-nav" id="mobileNav">
    <a href="/">Home</a>
    <a href="/cheatsheet/">Cheatsheet</a>
    <a href="/sql-project/">SQL Project</a>
    <a href="/excel-project/">Excel Project</a>
    <a href="/python-project/">Python Project</a>
    <a href="/admin/">Manage</a>
  </div>

  <header>
    <div class="logo">
      <a href="/"><img src="/raya.svg" alt="RAYA"></a>
    </div>
    <nav>
      <a href="/">Home</a>
      <a href="/cheatsheet/">Cheatsheet</a>
      <a href="/sql-project/">SQL Project</a>
      <a href="/excel-project/">Excel Project</a>
      <a href="/python-project/">Python Project</a>
      <a href="/admin/">Manage</a>
    </nav>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </header>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    <div class="footer-links">
      <a href="/about/">About Us</a>
      <a href="/contact/">Contact Us</a>
      <a href="/privacy/">Privacy Policy</a>
      <a href="/terms/">Terms &amp; Conditions</a>
    </div>
    <div class="copyright">
      &copy; {{ site.time | date: '%Y' }} {{ site.title }}
    </div>
  </footer>

  <script>
    (function() {
      var toggle = document.getElementById('menuToggle');
      var nav = document.getElementById('mobileNav');
      var overlay = document.getElementById('mobileOverlay');
      if (toggle && nav && overlay) {
        var links = Array.prototype.slice.call(nav.querySelectorAll('a'));
        function isOpen() { return nav.classList.contains('open'); }
        function closeMenu() {
          nav.classList.remove('open');
          overlay.classList.remove('active');
          document.body.style.overflow = '';
          toggle.focus();
        }
        function openMenu(focusTarget) {
          nav.classList.add('open');
          overlay.classList.add('active');
          document.body.style.overflow = 'hidden';
          if (focusTarget && focusTarget.focus) focusTarget.focus();
          else if (links.length) links[0].focus();
        }
        function toggleMenu() {
          if (isOpen()) closeMenu();
          else openMenu();
        }
        toggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', closeMenu);
        links.forEach(function(link) {
          link.addEventListener('click', closeMenu);
        });
        nav.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') { closeMenu(); return; }
          if (e.key !== 'Tab') return;
          var active = document.activeElement;
          var idx = links.indexOf(active);
          if (idx === -1) return;
          e.preventDefault();
          if (e.shiftKey) {
            idx = idx === 0 ? links.length - 1 : idx - 1;
          } else {
            idx = idx === links.length - 1 ? 0 : idx + 1;
          }
          links[idx].focus();
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && isOpen()) closeMenu();
        });
      }
    })();
  </script>
</body>
</html>
