<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}RAYA — Learn data analytics, SQL, Excel, Power BI, and Tableau with free cheatsheets and tutorials.{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #F3F3F3;
      --card-bg: #ffffff;
      --text-main: #111111;
      --border-radius: 20px;
    }
    * {
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #000000;
      color: #ffffff;
      padding: 20px 40px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
      flex: 1;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 400;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    nav a:hover {
      opacity: 1;
    }

    footer {
      background: #000;
      color: #fff;
      padding: 20px 40px;
      font-size: 14px;
    }
    footer a {
      color: #ccc;
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover {
      color: #fff;
    }
    @media (max-width: 768px) {
      footer {
        padding: 20px 10px;
      }
      footer a {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="/"><img src="/raya.svg" alt="RAYA" style="height:40px;display:block"></a>
    </nav>
  </header>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
      <a href="/about/">About Us</a>
      <a href="/contact/">Contact Us</a>
      <a href="/privacy/">Privacy Policy</a>
      <a href="/terms/">Terms &amp; Conditions</a>
    </div>
    <div style="text-align: center; margin-top: 10px; color: #666; font-size: 0.8rem;">
      &copy; {{ site.time | date: '%Y' }} {{ site.title }}
    </div>
  </footer>

</body>
</html>
