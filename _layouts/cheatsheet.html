---
layout: default
---
<style>
  .cheatsheet-wrap {
    display: flex;
    gap: 32px;
    align-items: flex-start;
  }
  .cheatsheet-sidebar {
    width: 280px;
    flex-shrink: 0;
    background: #000;
    color: #fff;
    border-radius: 16px;
    padding: 20px;
    position: sticky;
    top: 90px;
    max-height: calc(100vh - 110px);
    overflow-y: auto;
  }
  .cheatsheet-sidebar::-webkit-scrollbar {
    width: 6px;
  }
  .cheatsheet-sidebar::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 3px;
  }
  .sidebar-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 24px;
    padding-left: 12px;
    letter-spacing: -0.02em;
  }
  .unit-wrap {
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 8px;
  }
  .unit-wrap:last-child {
    border-bottom: none;
  }
  .unit-header {
    padding: 14px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: 600;
    font-size: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #b0b0b0;
    letter-spacing: 0.01em;
    transition: all 0.2s;
  }
  .unit-header:hover {
    color: #fff;
    background: rgba(255,255,255,0.05);
  }
  .unit-header.active {
    color: #fff;
    background: rgba(255,255,255,0.08);
  }
  .subtopics {
    display: none;
    padding-left: 0;
    margin-top: 4px;
  }
  .subtopics.show {
    display: block;
    animation: slideDown 0.3s ease-out;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .subtopic-link {
    display: block;
    padding: 10px 12px 10px 24px;
    text-decoration: none;
    color: #888;
    font-size: 0.9rem;
    border-left: 2px solid transparent;
    margin-bottom: 2px;
    transition: all 0.2s;
  }
  .subtopic-link:hover {
    color: #fff;
    border-left-color: rgba(255,255,255,0.3);
    padding-left: 28px;
  }
  .subtopic-link.active {
    color: #fff;
    border-left-color: #276EF1;
    background: rgba(255,255,255,0.03);
  }
  .cheatsheet-main {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .cheatsheet-main h2 {
    margin-top: 0;
    font-size: 1.5em;
  }
  .cheatsheet-main h3 {
    font-size: 1.15em;
    margin: 32px 0 16px;
    padding-top: 8px;
    scroll-margin-top: 100px;
  }
  .cheatsheet-main h3:first-of-type {
    margin-top: 0;
  }
  .cheatsheet-main ul {
    padding-left: 20px;
  }
  .cheatsheet-main li {
    margin-bottom: 8px;
    font-size: 15px;
    line-height: 1.6;
  }
  .cheatsheet-main code {
    background: var(--inline-code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
  }
  .cheatsheet-main li.hidden {
    display: none;
  }

  #cheatSearch {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    margin-bottom: 20px;
    box-sizing: border-box;
  }
  #cheatSearch:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(39,110,241,0.15);
  }

  .menu-toggle-sidebar {
    display: none;
    background: #000;
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 16px;
    width: 100%;
    font-weight: 600;
  }
  .menu-toggle-sidebar:hover {
    background: #222;
  }

  .cheatsheet-main .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--back-link);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85rem;
    padding: 6px 12px;
    border: 1px solid var(--border-light);
    border-radius: 999px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .cheatsheet-main .back-link:hover {
    color: var(--back-link-hover);
    border-color: var(--back-link);
    background: var(--surface-alt);
  }

  @media (max-width: 850px) {
    .cheatsheet-wrap {
      flex-direction: column;
    }
    .cheatsheet-sidebar {
      width: 100%;
      position: static;
      max-height: none;
      display: none;
    }
    .cheatsheet-sidebar.open {
      display: block;
    }
    .menu-toggle-sidebar {
      display: block;
    }
    .cheatsheet-main {
      padding: 20px;
    }
  }
</style>

<button class="menu-toggle-sidebar" id="sidebarToggle">☰ Categories</button>

<div class="cheatsheet-wrap">
  <aside class="cheatsheet-sidebar" id="cheatSidebar">
    <div class="sidebar-title">{{ page.title }}</div>
    {% for cat in page.categories %}
    <div class="unit-wrap">
      <div class="unit-header" data-target="{{ cat.id }}">
        <span>{{ cat.name }}</span>
        <span style="font-size:0.8rem;">&#9660;</span>
      </div>
      <div class="subtopics" data-parent="{{ cat.id }}">
        <a href="#{{ cat.id }}" class="subtopic-link">{{ cat.name }}</a>
      </div>
    </div>
    {% endfor %}
  </aside>

  <main class="cheatsheet-main">
    <a href="/cheatsheet/" class="back-link" style="margin-bottom:16px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      All Cheatsheets
    </a>
    <input type="text" id="cheatSearch" placeholder="Search formulas..." autocomplete="off">
    {{ content }}
  </main>
</div>

<script>
  (function() {
    var search = document.getElementById('cheatSearch');
    if (search) {
      search.addEventListener('input', function() {
        var q = this.value.toLowerCase();
        document.querySelectorAll('.cheatsheet-main li').forEach(function(li) {
          li.classList.toggle('hidden', q && !li.textContent.toLowerCase().includes(q));
        });
        document.querySelectorAll('.cheatsheet-main h3').forEach(function(h3) {
          var next = h3.nextElementSibling;
          var visible = next && next.tagName === 'UL' && Array.from(next.querySelectorAll('li')).some(function(li) { return !li.classList.contains('hidden'); });
          h3.style.display = (!q || visible) ? '' : 'none';
          if (next && next.tagName === 'UL') next.style.display = (!q || visible) ? '' : 'none';
        });
      });
    }

    var headers = document.querySelectorAll('.unit-header');
    headers.forEach(function(h) {
      h.addEventListener('click', function() {
        var sub = this.nextElementSibling;
        sub.classList.toggle('show');
        this.classList.toggle('active');
      });
    });

    document.getElementById('sidebarToggle')?.addEventListener('click', function() {
      document.getElementById('cheatSidebar').classList.toggle('open');
    });

    var links = document.querySelectorAll('.subtopic-link');
    links.forEach(function(link) {
      link.addEventListener('click', function() {
        links.forEach(function(l) { l.classList.remove('active'); });
        this.classList.add('active');
        if (window.innerWidth <= 850) {
          document.getElementById('cheatSidebar').classList.remove('open');
        }
      });
    });
  })();
</script>
