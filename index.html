---
layout: default
title: Home
description: RAYA — free cheatsheets and tutorials for Excel, Power BI, Tableau, and SQL. Learn data analytics with hands-on resources.
---

<style>
  .section-wrap {
    border: 1px solid var(--border);
    border-radius: var(--border-radius);
    padding: 20px;
    margin-bottom: 32px;
    background-color: var(--surface-alt);
    box-sizing: border-box;
  }
  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    align-items: stretch;
  }
  .course-card {
    text-decoration: none;
    color: inherit;
    display: block;
    height: 100%;
  }
  .course-card-inner {
    background: var(--surface);
    padding: 24px 16px;
    border-radius: var(--border-radius);
    border: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    height: 100%;
    box-sizing: border-box;
    justify-content: flex-start;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .course-card-inner:hover {
    border-color: var(--text);
    transform: translateY(-2px);
    box-shadow: var(--card-shadow-hover);
  }
  .card-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    flex: 1;
    justify-content: flex-start;
  }
  .card-text-wrap {
    width: 100%;
  }
  .icon-container {
    width: 64px;
    height: 64px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--icon-bg);
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .icon-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .course-card-inner h3 {
    font-size: 0.875rem;
    margin: 0;
    font-weight: 600;
    line-height: 1.4;
    color: var(--h3-card-color);
    word-break: break-word;
    white-space: normal;
    padding: 0 4px;
  }
  @media (max-width: 768px) {
    .course-grid {
      grid-template-columns: repeat(3, 1fr) !important;
      gap: 8px !important;
    }
    .section-wrap {
      padding: 10px !important;
    }
    .course-card-inner {
      padding: 12px 8px !important;
      border-radius: 12px !important;
    }
    .course-card-inner h3 {
      font-size: 0.8rem !important;
      word-wrap: break-word;
    }
    .icon-container {
      width: 36px !important;
      height: 36px !important;
      margin-bottom: 8px !important;
    }
  }
</style>

<div style="background: transparent; box-shadow: none; padding: 10px 0;">
  <div class="section-wrap">
    <div class="course-grid">
      <a class="course-card" href="/cheatsheet/">
        <div class="course-card-inner">
          <div class="card-content">
            <div class="icon-container">
              <img src="/assets/images/cheatsheet-icon.svg" alt="Cheatsheet">
            </div>
            <div class="card-text-wrap">
              <h3>Cheatsheet</h3>
            </div>
          </div>
        </div>
      </a>

    </div>
  </div>

  {% if site.posts.size > 0 %}
  <div class="section-wrap">
    <div class="course-grid">
      {% for post in site.posts %}
      <a class="course-card" href="{{ post.url }}">
        <div class="course-card-inner">
          <div class="card-content">
            <div class="icon-container">
              <img src="/assets/images/blog-icon.svg" alt="Blog">
            </div>
            <div class="card-text-wrap">
              <h3>{{ post.title }}</h3>
            </div>
          </div>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
  {% endif %}
</div>
